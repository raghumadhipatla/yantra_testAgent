on:
  push:

jobs:
  push-to-aws:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push same branch to CodeCommit
        env:
          AWS_USERNAME: ${{ secrets.AWS_USERNAME }}
          AWS_PASSWORD: ${{ secrets.AWS_PASSWORD }}
        run: |
          git remote add aws https://${AWS_USERNAME}:${AWS_PASSWORD}@git-codecommit.ap-southeast-2.amazonaws.com/v1/repos/yantra-app
          git push aws HEAD:${GITHUB_REF_NAME}
